jenkins:
  numExecutors: 2
  mode: NORMAL
  projectNamingStrategy: "standard"
  systemMessage: "TaskFlow Jenkins - CI/CD Pipeline"
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: ${JENKINS_ADMIN_ID}
          password: ${JENKINS_ADMIN_PASSWORD}

unclassified:
  location:
    url: "http://localhost:8081/"
